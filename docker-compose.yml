services:
  ai_biseo_server:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-biseo-server:dev
    working_dir: /app
    command: sh -c "npm run dev"
    env_file:
      - path: .env
        required: false
    environment:
      TZ: ${TZ:-Asia/Seoul}
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      NPM_CONFIG_LOGLEVEL: warn
      NODE_ENV: ${NODE_ENV:-development}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      ASSISTANT_ENABLE_LLM: ${ASSISTANT_ENABLE_LLM:-false}
      ASSISTANT_LLM_PROVIDER: ${ASSISTANT_LLM_PROVIDER:-none}
      NODE_EXTRA_CA_CERTS: /etc/ssl/certs/ca-certificates.crt
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      SQLITE_DB_PATH: ${SQLITE_DB_PATH:-./storage/sqlite/ai_biseo.db}
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:${APP_PORT:-3000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/app
      - ai_biseo_node_modules:/app/node_modules
      - ./storage/sqlite:/app/storage/sqlite
      - ./storage/artifacts:/app/storage/artifacts
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  ai_biseo_node_modules:
