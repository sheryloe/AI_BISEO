services:
  ai_biseo_server:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-biseo-server:dev
    working_dir: /app
    command: sh -c "npm run dev"
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Seoul}
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      NPM_CONFIG_LOGLEVEL: warn
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    ports:
      - "${APP_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:${HOST_DOCKER_IP:-172.30.1.114}"
    volumes:
      - ./:/app
      - ai_biseo_node_modules:/app/node_modules
      - ./storage/sqlite:/app/storage/sqlite
      - ./storage/artifacts:/app/storage/artifacts
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  ai_biseo_node_modules:
