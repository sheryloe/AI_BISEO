<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;500&family=Sora:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/dashboard/styles.css" />
</head>
<body data-page="settings">
  <button id="mobileNavToggle" class="mobile-nav-toggle" type="button" aria-label="메뉴 열기" aria-controls="sidebarNav" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
    <strong>MENU</strong>
  </button>
  <div id="mobileNavBackdrop" class="mobile-nav-backdrop" aria-hidden="true"></div>
  <div class="bg-mesh" aria-hidden="true"></div>
  <div class="orb orb-a" aria-hidden="true"></div>
  <div class="orb orb-b" aria-hidden="true"></div>

  <div class="shell">
    <aside id="sidebarNav" class="sidebar card">
      <a class="brand" href="/dashboard/">
        <p class="brand-overline">AI_BISEO</p>
        <h1>Ops Console</h1>
        <p>화면별 분리 운영 대시보드</p>
      </a>

      <button id="mobileNavClose" class="mobile-nav-close" type="button" aria-label="메뉴 닫기">Menu 닫기</button>

      <nav class="side-nav" aria-label="Dashboard Pages">
        <a class="nav-link" data-page="overview" href="/dashboard/">Overview</a>
        <a class="nav-link" data-page="assistant" href="/dashboard/assistant.html">Assistant</a>
        <a class="nav-link" data-page="pipeline" href="/dashboard/pipeline.html">Pipeline</a>
        <a class="nav-link" data-page="settings" href="/dashboard/settings.html">Settings</a>
        <a class="nav-link" data-page="diagnostics" href="/dashboard/diagnostics.html">Diagnostics</a>
        <a class="nav-link" data-page="events" href="/dashboard/events.html">Events</a>
      </nav>

      <div class="sidebar-foot mono">
        <div>Host: 127.0.0.1</div>
        <div>Port: 3010</div>
      </div>
    </aside>

    <main class="main-stage">
      <header class="topbar card">
        <div class="topbar-title">
          <p class="eyebrow">Live Runtime</p>
          <h2>Settings</h2>
        </div>
        <div class="status-grid">
          <article class="status-chip" id="wsChip" data-state="connecting">
            <h3>WebSocket</h3>
            <p id="wsStatus">connecting...</p>
          </article>
          <article class="status-chip">
            <h3>Last Route</h3>
            <p id="lastRoute">-</p>
          </article>
          <article class="status-chip">
            <h3>Last Event</h3>
            <p id="lastEvent">-</p>
          </article>
        </div>
      </header>

      <section class="content-grid one-col">
  <section id="settings" class="panel card">
    <h2>Main Settings</h2>
    <p class="section-help">민감값 저장 후 입력란은 자동으로 비워집니다.</p>

    <form id="settingsForm" class="settings-form">
      <label>
        Telegram Bot Token
        <input type="password" id="telegramBotTokenInput" placeholder="TELEGRAM_BOT_TOKEN" />
      </label>
      <label>
        Telegram Allowed Chat IDs
        <input type="text" id="telegramAllowedChatIdsInput" placeholder="TELEGRAM_ALLOWED_CHAT_IDS (comma-separated)" />
      </label>
      <label>
        OpenAI API Key
        <input type="password" id="openAiApiKeyInput" placeholder="OPENAI_API_KEY" />
      </label>
      <label>
        Google AI Studio API Key
        <input type="password" id="googleAiStudioApiKeyInput" placeholder="GOOGLE_AI_STUDIO_API_KEY" />
      </label>
      <label>
        Notion API Key
        <input type="password" id="notionApiKeyInput" placeholder="NOTION_API_KEY" />
      </label>
      <label>
        Notion Parent Page ID
        <input type="password" id="notionParentPageIdInput" placeholder="NOTION_PARENT_PAGE_ID" />
      </label>
      <label>
        n8n Callback Secret
        <input type="password" id="n8nBlogCallbackSecretInput" placeholder="N8N_BLOG_CALLBACK_SECRET" />
      </label>
      <button id="settingsSubmitBtn" type="submit">Save Settings</button>
      <p id="settingsResult">대기 중</p>
    </form>
  </section>
</section>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/dashboard/app.js"></script>
</body>
</html>
