<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;500&family=Sora:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/dashboard/styles.css" />
</head>
<body data-page="assistant">
  <button id="mobileNavToggle" class="mobile-nav-toggle" type="button" aria-label="메뉴 열기" aria-controls="sidebarNav" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
    <strong>MENU</strong>
  </button>
  <div id="mobileNavBackdrop" class="mobile-nav-backdrop" aria-hidden="true"></div>
  <div class="bg-mesh" aria-hidden="true"></div>
  <div class="orb orb-a" aria-hidden="true"></div>
  <div class="orb orb-b" aria-hidden="true"></div>

  <div class="shell">
    <aside id="sidebarNav" class="sidebar card">
      <a class="brand" href="/dashboard/">
        <p class="brand-overline">AI_BISEO</p>
        <h1>Ops Console</h1>
        <p>화면별 분리 운영 대시보드</p>
      </a>

      <button id="mobileNavClose" class="mobile-nav-close" type="button" aria-label="메뉴 닫기">Menu 닫기</button>

      <nav class="side-nav" aria-label="Dashboard Pages">
        <a class="nav-link" data-page="overview" href="/dashboard/">Overview</a>
        <a class="nav-link" data-page="assistant" href="/dashboard/assistant.html">Assistant</a>
        <a class="nav-link" data-page="pipeline" href="/dashboard/pipeline.html">Pipeline</a>
        <a class="nav-link" data-page="settings" href="/dashboard/settings.html">Settings</a>
        <a class="nav-link" data-page="diagnostics" href="/dashboard/diagnostics.html">Diagnostics</a>
        <a class="nav-link" data-page="events" href="/dashboard/events.html">Events</a>
      </nav>

      <div class="sidebar-foot mono">
        <div>Host: 127.0.0.1</div>
        <div>Port: 3010</div>
      </div>
    </aside>

    <main class="main-stage">
      <header class="topbar card">
        <div class="topbar-title">
          <p class="eyebrow">Live Runtime</p>
          <h2>Assistant</h2>
        </div>
        <div class="status-grid">
          <article class="status-chip" id="wsChip" data-state="connecting">
            <h3>WebSocket</h3>
            <p id="wsStatus">connecting...</p>
          </article>
          <article class="status-chip">
            <h3>Last Route</h3>
            <p id="lastRoute">-</p>
          </article>
          <article class="status-chip">
            <h3>Last Event</h3>
            <p id="lastEvent">-</p>
          </article>
        </div>
      </header>

      <section class="content-grid one-col">
  <section id="assistant" class="panel card">
    <div class="section-headline">
      <h2>Assistant Sandbox</h2>
      <p class="section-help">질문을 보내고 라우팅 결과를 확인합니다.</p>
    </div>

    <form id="assistantForm" class="assistant-form">
      <div class="row">
        <label>
          Chat ID
          <input type="text" id="chatId" value="web:test-user" />
        </label>
        <button type="submit">Send</button>
      </div>

      <label>
        Message
        <textarea id="assistantText" rows="5" placeholder="예: 오늘 할 일 우선순위 정리해줘"></textarea>
      </label>

      <div class="quick-prompts" id="quickPrompts">
        <button type="button" data-prompt="오늘 할 일 우선순위 정리해줘">일정 정리</button>
        <button type="button" data-prompt="최근 코딩 변경 이력 요약해줘">코딩 이력</button>
        <button type="button" data-prompt="이번 달 지출 요약해줘">가계부 요약</button>
        <button type="button" data-prompt="티스토리 블로그 글 작성해줘: 2026년 임시 공휴일">블로그 작성</button>
      </div>
    </form>

    <div class="split-grid">
      <article class="sub-panel">
        <h3>Assistant Result</h3>
        <pre id="assistantResult">응답 대기 중</pre>
      </article>
      <article class="sub-panel">
        <h3>Recent Chat History</h3>
        <ul id="assistantHistory" class="chat-history"></ul>
      </article>
    </div>
  </section>
</section>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/dashboard/app.js"></script>
</body>
</html>
